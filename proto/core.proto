syntax = "proto3";

package user;

service UserService {
  rpc GenerateOutput(GenerateOutputRequest) returns (GenerateOutputResponse);
}

message GenerateOutputRequest {
  repeated string proto_image_urls = 1;
}

message GenerateOutputResponseData {
  repeated string output_images = 1;
}

message GenerateOutputResponse {
  int32 code = 1;
  string message = 2;
  GenerateOutputResponseData data = 3;
}